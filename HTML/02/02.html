<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session 2: HTMLの骨格を理解する</title>
  <meta name="description" content="Session 2の練習ページ。HTMLの骨格とhead要素を確認する。" />
  <link rel="stylesheet" href="./02.css" />
</head>
<body>
  <!--
    Session 2 課題
    やってほしいこと:
    1) DOCTYPE, html, head, bodyを1つずつ消して表示差分を確認
    2) titleを書き換えてタブ表示の変化を見る
    3) meta charsetを意図的に変えて文字化けを確認して戻す
    4) このページのソースを表示してmeta descriptionを探す
    5) linkタグを一度削除してCSS未適用状態を確認

    座学で説明しやすいポイント:
    - タグは要素名、属性は追加情報、空要素は終了タグを持たない
    - headは画面に直接見えないが、検索・表示制御に強く影響する
    - UTF-8とviewportは日本語サイトとモバイル対応の基本設定
    - 何も書かなくても余白があるのはユーザーエージェントスタイルのため

    参考リンク:
    - https://developer.mozilla.org/ja/docs/Learn/HTML/Introduction_to_HTML/Getting_started
    - https://developer.mozilla.org/ja/docs/Learn/HTML/Introduction_to_HTML/The_head_metadata_in_HTML
  -->

  <h1>Session 2 練習</h1>
  <p>head内の設定を変更して、ブラウザの挙動を観察します。</p>
</body>
</html>
