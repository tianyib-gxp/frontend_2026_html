<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session 1: 最初のHTMLを表示する</title>
  <link rel="stylesheet" href="./01.css" />
</head>
<body>
  <!--
    Session 1 課題
    やってほしいこと:
    1) このファイルをコピーして、好きな名前のHTMLを1つ作る
    2) h1に自己紹介タイトルを書く
    3) pを2つ追加して、作りたいサイトの内容とターゲットを書く
    4) ul/liで、使いたい色とフォント候補を3つずつ書く

    座学で説明しやすいポイント:
    - ファイル名は小文字・ハイフン区切りにすると運用しやすい
    - HTMLは構造、CSSは見た目、JavaScriptは挙動を担当する
    - 企画メモを先に書くと、後の実装で迷いにくい

    参考リンク:
    - https://developer.mozilla.org/ja/docs/Learn/Getting_started_with_the_web/Dealing_with_files
    - https://developer.mozilla.org/ja/docs/Learn/Getting_started_with_the_web/What_will_your_website_look_like
  -->

  <h1>Hello</h1>
  <p>ここに作りたいサイトのテーマを書く。</p>
  <p>ここにターゲットユーザーを書く。</p>

  <h2>企画メモ</h2>
  <h3>コンテンツ案</h3>
  <ul>
    <li>例: プロフィール</li>
    <li>例: 制作実績</li>
    <li>例: お問い合わせ</li>
  </ul>

  <h3>配色・フォント案</h3>
  <ul>
    <li>色: #0b4f6c</li>
    <li>色: #f4f4f4</li>
    <li>色: #ff6b35</li>
  </ul>
</body>
</html>
