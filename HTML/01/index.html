<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session 1: 最初のHTMLを表示する</title>
    <link rel="stylesheet" href="./01.css" />
  </head>
  <body>
    <p>htmlを使用することでwebページを作ることができます</p>
    <p>課題に従ってこのページを編集してみよう！</p>
    <p>編集を更新するためにはリロードが必要です</p>
    <!-- 上のpタグは不要なら消してよいです -->

    <!--
    Session 1 課題
    やってほしいこと:
    1) h1に自己紹介タイトルを書く
    2) pを2つ追加して、自己紹介文を書く
    3) ul/liで、好きなことを箇条書きする

    課題が終わったら下のリンクを読んでください:
    - https://developer.mozilla.org/ja/docs/Learn/Getting_started_with_the_web/Dealing_with_files
    - https://developer.mozilla.org/ja/docs/Learn/Getting_started_with_the_web/What_will_your_website_look_like
  -->

    <h1>{自己紹介タイトル}</h1>
    <p>-</p>
    <p>-</p>

    <h2>好きなこと</h2>
    <h3>好きな○○</h3>
    <ul>
      <li>A</li>
      <li>B</li>
      <li>C</li>
    </ul>
  </body>
</html>
