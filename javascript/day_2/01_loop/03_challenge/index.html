<!DOCTYPE html>

  <head>

    <header class="page-header">
      <a href="../index.html">← 一覧へ</a>

      <p>for文を使って、FizzBuzz問題にチャレンジしましょう。</p>
    </header>

    <main>
      <section class="card">
        <h2>やってほしいこと</h2>
        <ol>
          <li>1から20までの数字をループで処理してください</li>
          <li>
            以下のルールで表示してください:
            <ul>
              <li>3の倍数 → "Fizz"</li>
              <li>5の倍数 → "Buzz"</li>
              <li>両方 → "FizzBuzz"</li>
              <li>それ以外 → 数字</li>
            </ul>
          </li>
        </ol>
      </section>

      <section class="card result">
        <h2>結果</h2>
        <div class="demo-area">
          <button onclick="runLoop()">実行</button>
          <ul id="list"></ul>
        </div>
      </section>
