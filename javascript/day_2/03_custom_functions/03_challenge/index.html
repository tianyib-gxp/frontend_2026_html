<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>関数 チャレンジ</title>
    <link rel="stylesheet" href="../../../index.css" />
  </head>
  <body>
    <button class="back-button" onclick="goBack()">← 戻る</button>

    <div class="container">
      <h1>関数 チャレンジ</h1>

      <section class="card">
        <h2>やってほしいこと</h2>
        <ol>
          <li>showMessage(text, type) を作る</li>
          <li>text を表示する</li>
          <li>type が "error" の場合 → "❌" をつける</li>
          <li>type が "success" の場合 → "✅" をつける</li>
        </ol>
      </section>

      <section class="card">
        <h2>結果</h2>
        <button onclick="run()">実行</button>
        <ul id="list"></ul>
      </section>
    </div>

    <script src="../../../index.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
