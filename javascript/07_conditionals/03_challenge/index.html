<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>条件文 チャレンジ</title>
    <link rel="stylesheet" href="../../index.css" />
  </head>
  <body>
    <header>
      <a href="../../index.html" class="back-button">← JavaScript 一覧へ</a>
      <h1>7-3. 条件文 チャレンジ</h1>
      <p>switch 文と三項演算子を使って月の日数カレンダーを作りましょう。</p>
    </header>

    <main>
      <section>
        <h2>チャレンジ：月の日数を表示する</h2>
        <ol>
          <li>月（1〜12）と年（うるう年判定用）を入力してください</li>
          <li><code>switch</code> 文で月に対応する日数を求めてください</li>
          <li>2月のうるう年判定: 年が4で割り切れる かつ（100で割り切れない または 400で割り切れる）場合は29日、それ以外は28日</li>
          <li>結果と三項演算子でうるう年かどうかを表示してください</li>
        </ol>
        <hr />
        <div class="demo-area">
          <div style="margin-bottom: 0.5rem; display: flex; gap: 1rem;">
            <label>月: <input type="number" id="month-input" value="2" min="1" max="12" style="width: 60px;" /></label>
            <label>年: <input type="number" id="year-input" value="2024" style="width: 90px;" /></label>
          </div>
          <a class="btn-demo" onclick="showDaysInMonth()">確認する</a>
          <div id="days-output" style="margin-top: 1rem; font-size: 1.1rem;"></div>
        </div>
      </section>
    </main>

    <script src="../../index.js"></script>
    <script src="./script.js"></script>
    <script src="../../lesson-nav.js"></script>
  </body>
</html>
