    <h1>JavaScript ループの練習</h1>

    <p>ループを使うと、同じ処理を何回も繰り返すことができます。</p>
    <p>今回は for 文を使って、数字を表示してみましょう！</p>

    <!--
    Session 1 課題（Loop 入門）

    やってほしいこと:

    1) 08.js に for 文を書いてください
    2) 1 から 5 までの数字を console に表示してください
       （console.log を使う）
    
    例:
    1
    2
    3
    4
    5

    ヒント:
    - for (let i = 0; i < ○; i++) の形を使います
    - i はカウンターです

    課題が終わったら下のリンクを読んでください:
    - https://developer.mozilla.org/ja/docs/Learn_web_development/Core/Scripting/Loops
