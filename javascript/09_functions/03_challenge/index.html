      <p>関数の応用問題にチャレンジしましょう。</p>
    </header>

    <main>
      <section>
        <h2>ボーナス問題：成績判定関数</h2>
        <ol>
          <li>関数 <code>calculateGrade(score)</code> を作る</li>
          <li>
            スコアに応じて以下の評価を <code>return</code> する:
            <ul>
              <li>90以上 → "A"</li>
              <li>70以上 → "B"</li>
              <li>50以上 → "C"</li>
              <li>それ以外 → "F"</li>
            </ul>
          </li>
          <li>
            スコアのリスト（95, 82, 67, 55, 40）に対して、「スコア: ○○ →
            ○」の形式で表示する
          </li>
        </ol>
        <hr />
        <div class="demo-area">
          <a class="btn-demo" onclick="runChallenge()">実行</a>
          <ul id="grade-list"></ul>
        </div>
      </section>
    </main>
