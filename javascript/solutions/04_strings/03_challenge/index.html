  <body>

      <h1>4-3. 文字列 チャレンジ（解答）</h1>
      <p>テンプレートリテラルと型変換を使って、割り勘計算結果メッセージを作成しましょう。</p>
    </header>

    <main>
      <section>
        <h2>チャレンジ：割り勘メッセージ生成</h2>
        <div class="demo-area">
          <div style="display: grid; gap: 0.4rem; margin-bottom: 1rem; max-width: 320px;">
            <label>イベント名: <input type="text" id="event-name" value="新年会" style="width: 100%;" /></label>
            <label>合計金額 (¥): <input type="number" id="total-bill" value="12500" style="width: 100%;" /></label>
            <label>人数: <input type="number" id="num-people" value="5" min="1" required style="width: 100%;" /></label>
          </div>
          <a class="btn-demo" onclick="generateSplitMessage()">メッセージ生成</a>
          <div id="split-output" style="margin-top: 1rem; white-space: pre-wrap; padding: 1rem; border: 1px solid #ccc; min-height: 60px;"></div>
        </div>
      </section>
    </main>
