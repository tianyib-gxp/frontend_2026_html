    <main>
      <section>
        <h2>チャレンジ：月の日数を表示する</h2>
        <div class="demo-area">
          <div style="margin-bottom: 0.5rem; display: flex; gap: 1rem;">
            <label>月: <input type="number" id="month-input" value="2" min="1" max="12" style="width: 60px;" /></label>
