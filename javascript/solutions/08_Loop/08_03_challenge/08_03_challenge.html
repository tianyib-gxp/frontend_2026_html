    <link rel="stylesheet" href="../../index.css" />

  <body>
    <button class="back-button" onclick="goBack()">← 戻る</button>

    <div class="container">
      <h1>ループ チャレンジ（回答）</h1>

      <section class="card">
        <h2>やってほしいこと</h2>
        <ol>
          <li>1から20までの数字をループで処理してください</li>
          <li>
            以下のルールで表示してください:
            <ul>
              <li>3の倍数 → "Fizz"</li>
              <li>5の倍数 → "Buzz"</li>
              <li>両方 → "FizzBuzz"</li>
              <li>それ以外 → 数字</li>
            </ul>
          </li>
        </ol>
      </section>

      <section class="card result">
        <h2>結果</h2>
        <button onclick="runLoop()">実行</button>
        <ul id="list"></ul>
      </section>
