<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>関数の導入</title>
    <link rel="stylesheet" href="../../../index.css" />
  </head>
  <body>
    <button class="back-button" onclick="goBack()">← 戻る</button>

    <div class="container">
      <h1>関数（Function）導入</h1>

      <section class="card">
        <h2>関数とは？</h2>
        <p>関数とは、処理をまとめて再利用できる仕組みです。</p>
        <p>必要なときに呼び出すことで、その処理を実行できます。</p>
      </section>

      <section class="card">
        <h2>やってほしいこと</h2>
        <ol>
          <li>sayHello 関数の中にコードを書く</li>
          <li>"Hello" と画面に表示する</li>
          <li>ボタンを押して確認する</li>
        </ol>
      </section>

      <section class="card">
        <h2>ヒント</h2>
        <ul>
          <li>addItem("Hello") を使う</li>
        </ul>
      </section>

      <section class="card result">
        <h2>結果</h2>
        <button onclick="sayHello()">実行</button>
        <ul id="list"></ul>
      </section>
    </div>

    <script src="../../../index.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
