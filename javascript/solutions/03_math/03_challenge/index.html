      <section>
        <h2>チャレンジ：チップ計算機</h2>

            <label>人数: <input type="number" id="people" value="2" min="1" style="width: 80px;" /></label>
          </div>
          <a class="btn-demo" onclick="calcTip()">計算する</a>
          <div id="tip-result" style="margin-top: 1rem;"></div>
        </div>
