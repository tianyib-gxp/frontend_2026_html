<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数値と演算子 練習（解答）</title>
    <link rel="stylesheet" href="../../../index.css" />
  </head>
  <body>
    <header class="solutions">
      <a href="../../index.html" class="back-button">← JavaScript 回答 一覧へ</a>
      <h1>3-2. 数値と演算子 練習（解答）</h1>
      <p>算術演算子を使って、簡単な電卓を作りましょう。</p>
    </header>

    <main>
      <section>
        <h2>問題：四則演算電卓</h2>
        <div class="demo-area">
          <div style="margin-bottom: 0.8rem; display: flex; gap: 0.5rem; align-items: center;">
            <input type="number" id="num1" value="10" style="width: 80px; padding: 0.3rem;" />
            <span style="font-size: 1.2rem;">&#9633;</span>
            <input type="number" id="num2" value="3" style="width: 80px; padding: 0.3rem;" />
          </div>
          <a class="btn-demo" onclick="calculate('+')">+</a>
          <a class="btn-demo" onclick="calculate('-')">−</a>
          <a class="btn-demo" onclick="calculate('*')">×</a>
          <a class="btn-demo" onclick="calculate('/')">÷</a>
          <div id="result" style="margin-top: 1rem; font-size: 1.2rem; font-weight: bold;"></div>
        </div>
      </section>
    </main>

    <script src="../../../index.js"></script>
    <script src="./script.js"></script>
    <script src="../../../lesson-nav.js"></script>
  </body>
</html>
