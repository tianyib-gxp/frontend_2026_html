<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>イベント 練習</title>
    <link rel="stylesheet" href="../../../index.css" />
  </head>
  <body>
    <header>
      <a href="../../index.html" class="back-button">← 一覧へ</a>
      <h1>12-2. イベント 練習</h1>
      <p>イベントリスナーを自分で追加しましょう。</p>
    </header>

    <main>
      <section>
        <h2>問題：ボタンのクリックカウンター</h2>
        <ol>
          <li>
            id が <code>countBtn</code> のボタンに
            <code>click</code> イベントを追加する
          </li>
          <li>ボタンがクリックされるたびに、カウントを1増やす</li>
          <li>
            id が
            <code>countDisplay</code>
            の要素にカウントを表示する（例：「クリック数: 3」）
          </li>
        </ol>
        <hr />
        <div class="demo-area">
          <a class="btn-demo" style="cursor: pointer" id="countBtn"
            >クリック！</a
          >
          <p id="countDisplay">クリック数: 0</p>
        </div>
      </section>
    </main>

    <script src="../../../index.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
