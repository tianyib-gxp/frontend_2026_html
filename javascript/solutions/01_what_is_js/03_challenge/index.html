<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />

    <title>JavaScriptとは チャレンジ（解答）</title>

  <body>
    <header class="solutions">
      <a href="../../index.html" class="back-button">← JavaScript 回答 一覧へ</a>
      <h1>1-3. JavaScriptとは チャレンジ（解答）</h1>
      <p>複数のボタンを使って、ページのコンテンツを動的に操作してみましょう。</p>
    </header>

    <main>
      <section>
        <h2>チャレンジ：インタラクティブなページ</h2>
        <div class="demo-area">
          <div id="main-box" style="padding: 1rem; border: 2px solid #ccc; background: white; transition: all 0.3s;">
            <a class="btn-demo" onclick="toggleTheme()">テーマ切替</a>
            <div style="margin-top: 1rem;">
              <input type="text" id="text-input" placeholder="テキストを入力..." style="padding: 0.4rem; width: 200px;" />
              <a class="btn-demo" onclick="addText()">テキスト追加</a>
              <a class="btn-challenge" onclick="clearList()">全て削除</a>
            </div>
            <ul id="text-list" style="margin-top: 0.5rem;"></ul>
          </div>
        </div>
      </section>
    </main>
