<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>便利な文字列メソッド 練習</title>
    <link rel="stylesheet" href="../../index.css" />
  </head>
  <body>
    <header>
      <a href="../../index.html" class="back-button">← JavaScript 一覧へ</a>
      <h1>5-2. 便利な文字列メソッド 練習</h1>
      <p>都市名を正規化（大文字小文字を修正）するプログラムを作りましょう。</p>
    </header>

    <main>
      <section>
        <h2>問題：都市名を正規化する</h2>
        <p>
          入力欄に不規則な大文字小文字の都市名（例: <code>lonDOn</code>、<code>tOKYO</code>）が入力されます。
          最初の文字だけ大文字、残りを小文字に変換してください。
        </p>
        <ol>
          <li>入力値を取得してください</li>
          <li><code>.toUpperCase()</code> で最初の文字を大文字にしてください</li>
          <li><code>.slice()</code> と <code>.toLowerCase()</code> で残りを小文字にしてください</li>
          <li>結果を <code>#city-output</code> に表示してください</li>
        </ol>
        <hr />
        <div class="demo-area">
          <div style="margin-bottom: 0.5rem;">
            <label>都市名: <input type="text" id="city-input" value="lonDOn" style="width: 150px;" /></label>
          </div>
          <a class="btn-demo" onclick="fixCityName()">正規化</a>
          <div id="city-output" style="margin-top: 1rem; font-size: 1.1rem;"></div>
        </div>
      </section>
    </main>

    <script src="../../index.js"></script>
    <script src="./script.js"></script>
    <script src="../../lesson-nav.js"></script>
  </body>
</html>
